# Safe handoff: `docker compose up --build` runs the backend with zero local
# Python setup. Mock LLM by default (offline). To use Claude, put ANTHROPIC_API_KEY
# in a .env file next to this compose file and set LLM_PROVIDER=claude.
#
# The frontend deploys to Vercel (reads static artifacts) and is not required here.
# A `web` service can be added once the frontend exists, for fully-local demos.

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - ARTIFACTS_DIR=/app/artifacts
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-*}
    volumes:
      - ./artifacts:/app/artifacts
