# `docker compose up --build` runs the FastAPI backend. The frontend is a
# separate Next.js app in ./frontend and can run locally or deploy to Vercel.

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.5-flash}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_TOUR_PROJECTS_TABLE=${SUPABASE_TOUR_PROJECTS_TABLE:-tour_projects}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-3D}
      - VIENEU_TTS_VOICE=${VIENEU_TTS_VOICE:-Ngọc Lan}
      - VIENEU_TTS_MODE=${VIENEU_TTS_MODE:-}
      - VIENEU_TTS_API_BASE=${VIENEU_TTS_API_BASE:-}
      - VIENEU_TTS_MODEL=${VIENEU_TTS_MODEL:-}
      - VIENEU_TTS_EMOTION=${VIENEU_TTS_EMOTION:-}
      - ARTIFACTS_DIR=/app/artifacts
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-*}
    volumes:
      - ./artifacts:/app/artifacts
